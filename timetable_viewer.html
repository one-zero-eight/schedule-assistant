<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Schedule Timetable Viewer</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --line: #d8dfeb;
      --head1: #1f5fae;
      --head2: #2d77cc;
      --headText: #ffffff;
      --slot: #f1f6ff;
      --meetingBg: #e7e0ff;
      --meetingBorder: #b5a3ef;
      --muted: #5a6473;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: #1f2732;
    }
    .app {
      width: 100%;
      max-width: none;
      margin: 12px auto;
      padding: 0 10px;
      padding-right: 360px;
    }
    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 14px;
      box-shadow: 0 3px 14px rgba(0, 0, 0, 0.06);
      margin-bottom: 12px;
    }
    .collapse-btn {
      border: 1px solid #c7d6ee;
      background: #f2f7ff;
      color: #2e4c7a;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    .show-config-btn {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      top: 8px;
      z-index: 60;
      display: none;
    }
    #controlsPanel {
      position: relative;
      padding-bottom: 28px;
    }
    .controls-collapse-btn {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: 6px;
    }
    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: end;
    }
    .control {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 250px;
      flex: 1;
    }
    label {
      font-size: 12px;
      color: var(--muted);
    }
    input[type="file"] {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 7px;
      background: #fff;
    }
    button {
      border: 1px solid #1a4f93;
      background: #2269bd;
      color: white;
      border-radius: 8px;
      padding: 9px 12px;
      cursor: pointer;
      font-weight: 600;
    }
    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .week-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .tab-btn {
      border: 1px solid #c7d6ee;
      background: #f2f7ff;
      color: #2e4c7a;
      border-radius: 999px;
      padding: 6px 12px;
      cursor: pointer;
      font-weight: 700;
      font-size: 12px;
    }
    .tab-btn.active {
      background: #2269bd;
      color: #fff;
      border-color: #1a4f93;
    }
    .week-pill {
      background: #eaf2ff;
      border: 1px solid #c5d9ff;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 13px;
      color: #1a4f93;
      font-weight: 600;
    }
    .msg {
      color: #8e2a2a;
      font-size: 13px;
      white-space: pre-wrap;
    }
    .meta {
      color: #4f5c6d;
      font-size: 12px;
    }
    .stats {
      margin-top: 8px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .chip {
      font-size: 12px;
      border: 1px solid #d4deef;
      background: #f6f9ff;
      color: #35507a;
      border-radius: 999px;
      padding: 4px 9px;
      font-weight: 600;
    }
    .detail {
      margin-top: 10px;
      border: 1px solid #d8dfeb;
      background: #fbfdff;
      border-radius: 8px;
      padding: 10px;
      font-size: 12px;
    }
    .detail-title {
      font-weight: 700;
      color: #243957;
    }
    .detail-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }
    .detail-summary {
      font-size: 12px;
      color: #4f5c6d;
      margin-bottom: 8px;
      min-height: 16px;
    }
    .clear-btn {
      border: 1px solid #c7d6ee;
      background: #f2f7ff;
      color: #2e4c7a;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }
    .section-title {
      font-size: 12px;
      font-weight: 700;
      color: #2d4f80;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin: 8px 0 2px;
    }
    .divider {
      height: 1px;
      background: #ccd9ee;
      margin: 8px 0;
      border-radius: 1px;
    }
    .detail-histogram-wrap {
      flex-shrink: 0;
      margin: 10px 0 8px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .workload-histogram {
      margin: 0;
      padding: 10px 8px;
      border: 1px solid #d8dfeb;
      border-radius: 8px;
      background: #f6f9ff;
    }
    .workload-histogram .hist-title {
      font-size: 11px;
      font-weight: 700;
      color: #2d4f80;
      text-transform: uppercase;
      letter-spacing: 0.35px;
      margin-bottom: 6px;
    }
    .hist-subtitle {
      font-size: 11px;
      color: #4f5c6d;
      line-height: 1.35;
      margin-bottom: 10px;
      position: relative;
      z-index: 1;
    }
    .hist-bars {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 4px;
      height: 96px;
      min-height: 0;
      overflow: hidden;
    }
    .hist-col {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100%;
      min-height: 0;
    }
    .hist-bar-wrap {
      flex: 1;
      width: 100%;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      min-height: 0;
      overflow: hidden;
    }
    .hist-bar {
      width: 78%;
      max-width: 28px;
      min-height: 3px;
      max-height: 100%;
      box-sizing: border-box;
      border-radius: 4px 4px 2px 2px;
      background: linear-gradient(180deg, #3d84d6 0%, #2269bd 100%);
      box-shadow: 0 1px 2px rgba(34, 105, 189, 0.25);
    }
    .hist-bar.zero {
      min-height: 0;
      height: 3px;
      opacity: 0.35;
      background: #b8c9e0;
      box-shadow: none;
    }
    .hist-day {
      font-size: 10px;
      font-weight: 700;
      color: #4f5c6d;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.2px;
    }
    .hist-count {
      font-size: 10px;
      color: #5a6473;
      margin-top: 1px;
    }
    .detail-list {
      display: grid;
      gap: 2px;
      max-height: 180px;
      overflow: auto;
    }
    .detail-item {
      padding: 2px 0;
      background: transparent;
      line-height: 1.4;
      border: none;
      border-radius: 0;
      color: #243957;
      word-break: break-word;
    }
    .detail-line-muted { color: #4f5c6d; }
    .kv b { font-weight: 700; color: #243957; }
    .detail-subitem { margin-left: 12px; }
    .config-block {
      border: 1px solid #d8dfeb;
      border-radius: 6px;
      background: #f9fbff;
      padding: 4px 8px;
    }
    .config-block summary {
      cursor: pointer;
      font-weight: 700;
      color: #2d4f80;
      user-select: none;
    }
    .config-block pre {
      margin: 8px 0 4px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 11px;
      line-height: 1.35;
      color: #2b3644;
    }
    .clickable {
      color: #4f5c6d;
      text-decoration: underline dotted;
      text-underline-offset: 2px;
      cursor: pointer;
      font-weight: 600;
    }
    .clickable:hover {
      color: #303a47;
      text-decoration-style: solid;
    }
    .over-capacity .clickable,
    .over-capacity .clickable:hover {
      color: #b42318;
    }
    .grid-wrap {
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: auto;
      background: #fff;
      width: 100%;
      min-height: 320px;
      flex: 1;
      overscroll-behavior-x: contain;
      overflow-anchor: none;
    }
    .top-scroll {
      width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      border: 1px solid var(--line);
      border-bottom: none;
      border-radius: 10px 10px 0 0;
      background: #f7faff;
      height: 18px;
      overscroll-behavior-x: contain;
      transform: translateZ(0);
    }
    .table-stage {
      position: sticky;
      top: 8px;
      height: calc(100vh - 110px);
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    body.config-hidden #configPanel {
      display: none;
    }
    body.config-hidden #controlsPanel {
      display: none;
    }
    body.config-hidden .show-config-btn {
      display: inline-block;
    }
    body.config-hidden .table-stage {
      height: calc(100vh - 16px);
    }
    .top-scroll-inner {
      height: 1px;
    }
    .grid-wrap.with-top-scroll {
      border-radius: 0 0 10px 10px;
    }
    table {
      border-collapse: separate;
      border-spacing: 0;
      min-width: 980px;
      width: 100%;
    }
    th, td {
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 8px;
      vertical-align: top;
      font-size: 12px;
    }
    th:first-child, td:first-child {
      border-left: 1px solid var(--line);
    }
    tr:first-child th {
      border-top: 1px solid var(--line);
    }
    .left-head {
      background: var(--head1);
      color: var(--headText);
      text-align: center;
      min-width: 130px;
      width: 130px;
      position: sticky;
      top: 0;
      left: 0;
      z-index: 9;
    }
    .year-head {
      background: var(--head1);
      color: var(--headText);
      text-align: center;
      font-size: 13px;
      position: sticky;
      top: 0;
      z-index: 8;
      cursor: pointer;
      user-select: none;
    }
    .year-head.selected {
      box-shadow: inset 0 -3px 0 #ffd54f;
    }
    .group-head {
      background: var(--head2);
      color: var(--headText);
      text-align: center;
      min-width: 170px;
      cursor: pointer;
      position: sticky;
      z-index: 8;
    }
    .group-head.core-subhead { top: 33px; }
    .group-head.single-head { top: 0; }
    .slot-cell {
      background: var(--slot);
      font-weight: 700;
      text-align: center;
      position: sticky;
      left: 0;
      z-index: 4;
    }
    .meeting {
      background: var(--meeting-bg, var(--meetingBg));
      border: 1px solid var(--meeting-border, var(--meetingBorder));
      border-radius: 8px;
      padding: 7px;
      display: grid;
      gap: 4px;
      min-height: 78px;
      cursor: pointer;
      margin-bottom: 6px;
      overflow: hidden;
      contain: layout;
    }
    .meeting:last-child { margin-bottom: 0; }
    .meeting.selected {
      outline: 2px solid #1d3f70;
      box-shadow: 0 0 0 2px rgba(29, 63, 112, 0.2) inset;
    }
    .meeting.related {
      outline: 1px dashed rgba(29, 63, 112, 0.55);
      box-shadow: 0 0 0 1px rgba(29, 63, 112, 0.14) inset;
    }
    .meeting.selected,
    .meeting.selected.related {
      outline: 2px solid #1d3f70;
      box-shadow: 0 0 0 2px rgba(29, 63, 112, 0.2) inset, 0 2px 10px rgba(0, 0, 0, 0.12);
    }
    .meeting .subject {
      font-weight: 700;
      line-height: 1.25;
      white-space: normal;
      overflow: visible;
      text-overflow: clip;
      word-break: break-word;
    }
    .meeting .line {
      color: #313b49;
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .link-cell {
      position: relative;
    }
    .cell-connector {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 2px;
      height: 14px;
      background: var(--connector-color, #7d8aa0);
      z-index: 12;
      pointer-events: none;
      border-radius: 999px;
      box-shadow: 0 0 0 1px rgba(80, 92, 110, 0.15);
    }
    .cell-connector.down { bottom: -7px; }
    .cell-connector.up { top: -7px; }
    .cell-connector.both {
      top: 50%;
      transform: translate(-50%, -50%);
      height: 20px;
    }
    .meeting .line.over-capacity {
      color: #b42318;
      font-weight: 700;
    }
    .empty {
      min-height: 78px;
      background: #fafcff;
      border-radius: 8px;
    }
    .slot-row td {
      height: 108px;
    }
    .slot-row .meeting,
    .slot-row .empty {
      height: 100%;
      min-height: 0;
    }
    .no-events-program-slot {
      background: #eef1f6;
    }
    .slot-cell.no-events-row {
      background: #e3e8f1;
      color: #5e6673;
    }
    .no-events-program-slot .empty {
      background: #e9edf3;
    }
    .day-row td {
      background: #edf4ff;
      font-weight: 700;
      color: #1d3f70;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      position: sticky;
      top: 66px;
      z-index: 6;
    }
    .day-label {
      position: sticky;
      left: 0;
      display: inline-block;
      background: #edf4ff;
      padding: 0 4px 0 0;
      z-index: 7;
    }
    .group-head.selected {
      box-shadow: inset 0 -3px 0 #ffd54f;
    }
    .floating-detail {
      position: fixed;
      top: 12px;
      right: 12px;
      width: 335px;
      z-index: 40;
      margin-top: 0;
      max-height: calc(100vh - 24px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .floating-detail .detail-list {
      max-height: none;
      overflow: auto;
      flex: 1;
      min-height: 120px;
    }
    @media (max-width: 1200px) {
      .app {
        padding-right: 10px;
      }
      .floating-detail {
        position: static;
        width: auto;
        max-height: none;
        margin-top: 10px;
      }
      .floating-detail .detail-list {
        max-height: 220px;
      }
      .table-stage {
        height: calc(100vh - 12px);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <button id="showConfigBtn" type="button" class="show-config-btn collapse-btn" title="Show configuration">▼</button>

    <div id="configPanel" class="panel">
      <div class="row">
        <div class="control">
          <label for="configFile">Config YAML (`config.yaml`)</label>
          <input id="configFile" type="file" accept=".yaml,.yml" />
        </div>
        <div class="control">
          <label for="outputFile">Output YAML (`output.yaml`)</label>
          <input id="outputFile" type="file" accept=".yaml,.yml" />
        </div>
        <div>
          <button id="renderBtn">Render timetable</button>
        </div>
      </div>
      <div class="meta" id="meta"></div>
      <div class="stats" id="stats"></div>
      <div class="msg" id="msg"></div>
    </div>

    <div id="controlsPanel" class="panel">
      <div class="week-bar">
        <button id="prevWeek">Previous week</button>
        <span class="week-pill" id="weekLabel">Week -</span>
        <button id="nextWeek">Next week</button>
      </div>
      <div class="tabs">
        <button type="button" class="tab-btn active" data-tab="core">Core Courses</button>
        <button type="button" class="tab-btn" data-tab="english">English</button>
        <button type="button" class="tab-btn" data-tab="instructor">Instructor Utilization</button>
        <button type="button" class="tab-btn" data-tab="room">Room Utilization</button>
      </div>
      <button id="hideConfigBtn" type="button" class="collapse-btn controls-collapse-btn" title="Hide configuration">▲</button>
    </div>

    <div id="tableStage" class="table-stage">
      <div id="topScroll" class="top-scroll">
        <div id="topScrollInner" class="top-scroll-inner"></div>
      </div>
      <div id="gridWrap" class="grid-wrap with-top-scroll">
        <table id="table"></table>
      </div>
    </div>

    <div class="detail floating-detail" id="detail">
      <div class="detail-head">
        <div class="detail-title" id="detailTitle">Selection</div>
        <button class="clear-btn" id="clearSelectionBtn" type="button">Clear</button>
      </div>
      <div class="detail-summary" id="detailSummary"></div>
      <div id="detailHistogram" class="detail-histogram-wrap" hidden></div>
      <div class="detail-list" id="detailList">
        <div class="detail-item">Click a meeting, group, or instructor to inspect details.</div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  <script>
    const state = {
      config: null,
      output: null,
      weeks: [],
      weekIndex: 0,
      columns: [],
      grid: null,
      allMeetings: [],
      selection: null,
      courseColors: {},
      activeTab: "core",
      roomCapacityById: {},
      groupSizeById: {},
      courseTabByName: {}
    };

    const DAY_NAMES = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
    const DEFAULT_TIME_SLOTS = ["09:00", "10:30", "12:10", "14:00", "15:30", "17:10", "18:40"];

    const msgEl = document.getElementById("msg");
    const metaEl = document.getElementById("meta");
    const statsEl = document.getElementById("stats");
    const detailTitleEl = document.getElementById("detailTitle");
    const detailSummaryEl = document.getElementById("detailSummary");
    const detailHistogramEl = document.getElementById("detailHistogram");
    const detailListEl = document.getElementById("detailList");
    const topScrollEl = document.getElementById("topScroll");
    const topScrollInnerEl = document.getElementById("topScrollInner");
    const tableStageEl = document.getElementById("tableStage");
    const gridWrapEl = document.getElementById("gridWrap");
    const tableEl = document.getElementById("table");
    const weekLabelEl = document.getElementById("weekLabel");
    /** Avoid ping-pong when programmatic scrollLeft fires a nested scroll event. */
    let hScrollFromTopBar = false;
    let hScrollFromGrid = false;

    function setMsg(text) {
      msgEl.textContent = text || "";
    }

    function dayKey(dateStr) {
      const d = new Date(dateStr + "T00:00:00");
      return DAY_NAMES[d.getDay() === 0 ? 6 : d.getDay() - 1];
    }

    function filterMeetingsToCurrentWeek(meetings) {
      const wk = state.weeks[state.weekIndex];
      if (!wk) return [];
      return (meetings || []).filter((m) => {
        const dt = new Date(m.date + "T00:00:00");
        const monday = new Date(dt);
        const day = (dt.getDay() + 6) % 7;
        monday.setDate(dt.getDate() - day);
        return monday.toISOString().slice(0, 10) === wk.start;
      });
    }

    function weekdaySessionCounts(meetings) {
      const counts = Object.fromEntries(DAY_NAMES.map((d) => [d, 0]));
      for (const m of meetings || []) {
        const dk = dayKey(m.date);
        if (counts[dk] !== undefined) counts[dk] += 1;
      }
      return counts;
    }

    /** Per weekday: number of distinct courses (subjects) with at least one session. */
    function weekdayDistinctCourseCounts(meetings) {
      const sets = Object.fromEntries(DAY_NAMES.map((d) => [d, new Set()]));
      for (const m of meetings || []) {
        const dk = dayKey(m.date);
        if (sets[dk] !== undefined && m.course) sets[dk].add(m.course);
      }
      return DAY_NAMES.map((d) => sets[d].size);
    }

    function histTooltipAttr(text) {
      return String(text).replace(/&/g, "&amp;").replace(/"/g, "&quot;");
    }

    /** Hours per meeting slot (90 min) × number of groups in that meeting, summed by weekday. */
    const MEETING_HOURS_PER_SLOT = 1.5;

    function weekdayWeightedMeetingHours(meetings) {
      const sums = DAY_NAMES.map(() => 0);
      const dayIndex = Object.fromEntries(DAY_NAMES.map((d, i) => [d, i]));
      for (const m of meetings || []) {
        const dk = dayKey(m.date);
        const i = dayIndex[dk];
        if (i === undefined) continue;
        const g = (m.groups || []).length;
        sums[i] += MEETING_HOURS_PER_SLOT * g;
      }
      return sums;
    }

    /** One card: title, subtitle, bars. vals length 7 aligned with DAY_NAMES. */
    function singleWeekdayHistogramHtml(title, subtitle, vals, tooltipLine, options) {
      const formatBarLabel =
        options && typeof options.formatBarLabel === "function"
          ? options.formatBarLabel
          : (v) => String(v);
      const maxVal = Math.max(0, ...vals);
      const max = maxVal > 0 ? maxVal : 1;
      const bars = DAY_NAMES.map((day, i) => {
        const n = vals[i];
        const pct = max > 0 ? (n / max) * 100 : 0;
        const barClass = n === 0 ? "hist-bar zero" : "hist-bar";
        const h = n === 0 ? 3 : Math.max(8, Math.round((pct / 100) * 88));
        const tip = tooltipLine(day, n);
        return (
          `<div class="hist-col" title="${histTooltipAttr(tip)}">` +
          `<div class="hist-bar-wrap"><div class="${barClass}" style="height:${h}px"></div></div>` +
          `<div class="hist-day">${day.slice(0, 3)}</div>` +
          `<div class="hist-count">${formatBarLabel(n)}</div>` +
          `</div>`
        );
      }).join("");
      return (
        `<div class="workload-histogram">` +
        `<div class="hist-title">${title}</div>` +
        `<div class="hist-subtitle">${subtitle}</div>` +
        `<div class="hist-bars">${bars}</div>` +
        `</div>`
      );
    }

    /** Each slot meeting counts as 90 minutes (matches grid). */
    function workloadHistogramHtml(meetings) {
      const counts = weekdaySessionCounts(meetings);
      const vals = DAY_NAMES.map((d) => counts[d] || 0);
      const totalSessions = vals.reduce((a, b) => a + b, 0);
      const totalMin = totalSessions * 90;
      const subtitle =
        totalSessions > 0
          ? `${totalSessions} session${totalSessions === 1 ? "" : "s"} · ${totalMin} min scheduled`
          : "No sessions this week";
      return singleWeekdayHistogramHtml(
        "Weekday workload (visible week)",
        subtitle,
        vals,
        (day, n) => `${day}: ${n} session${n === 1 ? "" : "s"}`
      );
    }

    function groupWeekHistogramsHtml(meetings) {
      const eventCounts = weekdaySessionCounts(meetings);
      const valsEvents = DAY_NAMES.map((d) => eventCounts[d] || 0);
      const totalEvents = valsEvents.reduce((a, b) => a + b, 0);
      const totalMin = totalEvents * 90;
      const subEvents =
        totalEvents > 0
          ? `${totalEvents} event${totalEvents === 1 ? "" : "s"} · ${totalMin} min scheduled`
          : "No events this week";

      const valsSubjects = weekdayDistinctCourseCounts(meetings);
      const maxInOneDay = Math.max(0, ...valsSubjects);
      const uniqueCoursesWeek = new Set((meetings || []).map((m) => m.course).filter(Boolean)).size;
      const subSubjects =
        uniqueCoursesWeek > 0
          ? `${uniqueCoursesWeek} distinct subject${uniqueCoursesWeek === 1 ? "" : "s"} this week · up to ${maxInOneDay} on one day`
          : "No subjects this week";

      const valsHours = weekdayWeightedMeetingHours(meetings);
      const totalWeightedH = valsHours.reduce((a, b) => a + b, 0);
      const subHours =
        totalWeightedH > 0
          ? `${totalWeightedH.toFixed(1)} h total · per meeting: ${MEETING_HOURS_PER_SLOT} h × (groups in that meeting), summed by day`
          : "No weighted hours this week";
      const fmtH = (v) => (Math.abs(v) < 1e-9 ? "0" : Number(v).toFixed(1));

      return (
        singleWeekdayHistogramHtml(
          "Events by weekday (visible week)",
          subEvents,
          valsEvents,
          (day, n) => `${day}: ${n} event${n === 1 ? "" : "s"}`
        ) +
        singleWeekdayHistogramHtml(
          "Distinct subjects by weekday (visible week)",
          subSubjects,
          valsSubjects,
          (day, n) => `${day}: ${n} distinct subject${n === 1 ? "" : "s"}`
        ) +
        singleWeekdayHistogramHtml(
          "Meeting hours by weekday (visible week)",
          subHours,
          valsHours,
          (day, n) =>
            `${day}: ${fmtH(n)} h (${MEETING_HOURS_PER_SLOT} h × groups per meeting, summed)`,
          { formatBarLabel: fmtH }
        )
      );
    }

    function parseYamlFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          try {
            resolve(window.jsyaml.load(reader.result));
          } catch (err) {
            reject(err);
          }
        };
        reader.onerror = () => reject(reader.error);
        reader.readAsText(file, "utf-8");
      });
    }

    function toMinutes(timeStr) {
      const [h, m] = String(timeStr).split(":").map(Number);
      return h * 60 + m;
    }

    function add90m(timeStr) {
      const total = toMinutes(timeStr) + 90;
      const h = Math.floor(total / 60);
      const m = total % 60;
      return `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`;
    }

    function uniqueSorted(arr) {
      return Array.from(new Set(arr)).sort();
    }

    function hashString(str) {
      let h = 2166136261;
      for (let i = 0; i < str.length; i++) {
        h ^= str.charCodeAt(i);
        h += (h << 1) + (h << 4) + (h << 7) + (h << 8) + (h << 24);
      }
      return h >>> 0;
    }

    function buildCourseColors(meetings) {
      const subjects = Array.from(new Set((meetings || []).map(m => m.course))).sort();
      const out = {};
      // Golden-angle mix on hash spreads hues across the wheel (stable per course name).
      // Saturation/lightness vary — avoids old 90–94% L pastels that all looked the same.
      const GOLDEN_HUE_STEP = 137.508;
      for (const subject of subjects) {
        const h = (hashString(subject) * GOLDEN_HUE_STEP) % 360;
        const mix = hashString(subject + "\0sat");
        const s = 64 + (mix % 4) * 9;
        const l = 78 + ((mix >>> 3) % 5) * 3.2;
        const borderS = Math.min(96, s + 8);
        const borderL = Math.max(34, l - 28);
        out[subject] = {
          bg: `hsl(${h.toFixed(2)}, ${s}%, ${l.toFixed(1)}%)`,
          border: `hsl(${h.toFixed(2)}, ${borderS}%, ${borderL}%)`
        };
      }
      return out;
    }

    function colorBySubject(subject) {
      if (state.courseColors && state.courseColors[subject]) {
        return state.courseColors[subject];
      }
      const h = hashString(subject) % 360;
      return {
        bg: `hsl(${h}, 76%, 82%)`,
        border: `hsl(${h}, 82%, 48%)`
      };
    }

    function meetingSelectionKey(m) {
      return m.instance_id;
    }

    function signatureMeeting(m) {
      const inst = (m.instructors || []).join("|");
      const groups = (m.groups || []).slice().sort().join("|");
      return `${m.course}|${m.tag}|${m.date}|${m.start}|${groups}|${inst}|${m.room || "-"}`;
    }

    function mergedMeetingsForCell(meetings) {
      const merged = new Map();
      for (const m of meetings || []) {
        const sign = signatureMeeting(m);
        const row = merged.get(sign) || { sign, sample: m, count: 0 };
        row.count += 1;
        merged.set(sign, row);
      }
      return Array.from(merged.values()).sort((a, b) => a.sign.localeCompare(b.sign));
    }

    function cellSignature(mergedRows) {
      if (!mergedRows.length) return "";
      return mergedRows.map(r => `${r.sign}#${r.count}`).join("||");
    }

    function updateStats() {
      const meetings = state.allMeetings || [];
      const wk = state.weeks[state.weekIndex];
      const weekMeetings = wk ? meetings.filter(m => {
        const dt = new Date(m.date + "T00:00:00");
        const monday = new Date(dt);
        const day = (dt.getDay() + 6) % 7;
        monday.setDate(dt.getDate() - day);
        return monday.toISOString().slice(0, 10) === wk.start;
      }) : [];
      const courses = new Set(weekMeetings.map(m => m.course)).size;
      const instructors = new Set(weekMeetings.flatMap(m => m.instructors || [])).size;
      const rooms = new Set(weekMeetings.map(m => m.room)).size;

        `<span class="chip">Week meetings: ${weekMeetings.length}</span>`,

        `<span class="chip">Rooms: ${rooms}</span>`

    function buildGroupMeta(config) {
      const groupNames = {};
      const byProgram = {};
      const programs = config.programs || {};
      for (const level of Object.keys(programs)) {
        for (const p of programs[level] || []) {
          const yearLabel = p.name;
          if (!byProgram[yearLabel]) byProgram[yearLabel] = new Set();
          for (const tr of p.tracks || []) {
            for (const g of tr.groups || []) {
              byProgram[yearLabel].add(g);
            }
          }
        }
      }
      for (const bucketName of ["academic", "english", "elective"]) {
        for (const g of (config.student_groups?.[bucketName] || [])) {
          groupNames[g.id] = g.name || g.id;
        }
      }
      return { groupNames, byProgram };
    }

    function buildRoomCapacityMap(config) {
      const out = {};
      for (const r of (config.rooms || [])) out[r.id] = r.capacity;
      return out;
    }

    function buildGroupSizeMap(config) {
      const out = {};
      for (const bucketName of ["academic", "english", "elective"]) {
        for (const g of (config.student_groups?.[bucketName] || [])) {
          out[g.id] = Number.isFinite(g.estimated_size) ? g.estimated_size : null;
        }
      }
      return out;
    }

    function meetingStudentCount(meeting) {
      return (meeting.groups || []).reduce((acc, gid) => {
        const n = state.groupSizeById?.[gid];
        return acc + (Number.isFinite(n) ? n : 0);
      }, 0);
    }

    function inferCourseTabFromName(name) {
      const lowered = String(name || "").trim().toLowerCase();
      if (lowered.includes("english") || lowered.includes("foreign language")) return "english";
      return "core";
    }

    function buildCourseTabMap(config) {
      const out = {};
      for (const course of (config.courses || [])) {
        const tags = (course.course_tags || []).map((t) => String(t).trim().toLowerCase());
        out[course.name] = tags.includes("english") ? "english" : inferCourseTabFromName(course.name);
      }
      return out;
    }

    function filterMeetingsByTab(meetings, tabMode) {
      if (tabMode === "english") return (meetings || []).filter((m) => m.courseTab === "english");
      if (tabMode === "core") return (meetings || []).filter((m) => m.courseTab !== "english");
      return meetings || [];
    }

    function roomFillPercent(meeting) {
      const capacity = state.roomCapacityById?.[meeting.room];
      const students = meetingStudentCount(meeting);
      if (!Number.isFinite(capacity) || capacity <= 0) return "-";
      return `${Math.round((students / capacity) * 100)}%`;
    }

    function buildColumns(config, output) {
      const meta = buildGroupMeta(config);
      const usedGroups = new Set();
      for (const course of (output.schedule?.courses || [])) {
        for (const comp of (course.components || [])) {
          for (const s of (comp.sessions || [])) {
            for (const g of (s.audience || [])) usedGroups.add(g);
          }
        }
      }

      const columns = [];
      for (const [yearLabel, groupsSet] of Object.entries(meta.byProgram)) {
        const groups = Array.from(groupsSet).filter(g => usedGroups.has(g)).sort();
        for (const gid of groups) {
          columns.push({
            yearLabel,
            groupId: gid,
            groupLabel: meta.groupNames[gid] || gid
          });
        }
      }
      const known = new Set(columns.map(c => c.groupId));
      for (const gid of Array.from(usedGroups).sort()) {
        if (!known.has(gid)) {
          columns.push({
            yearLabel: "Other",
            groupId: gid,
            groupLabel: meta.groupNames[gid] || gid
          });
        }
      }
      return columns;
    }

    function buildMeetings(output, courseTabByName) {
      const flat = [];
      for (const [courseIdx, course] of (output.schedule?.courses || []).entries()) {
        for (const [compIdx, comp] of (course.components || []).entries()) {
          for (const [seriesIdx, series] of (comp.sessions || []).entries()) {
            const n = series.dates?.length || 0;
            for (let i = 0; i < n; i++) {
              flat.push({
                instance_id: `${courseIdx}:${compIdx}:${seriesIdx}:${i}`,
                course: course.name,
                tag: comp.tag,
                groups: series.audience || [],
                date: series.dates[i],
                start: String(series.start_times[i]).slice(0, 5),
                room: series.rooms[i],
                instructors: series.instructors[i] || [],
                instructor_pool: comp.instructor_pool || [],
                courseTab: courseTabByName?.[course.name] || inferCourseTabFromName(course.name)
              });
            }
          }
        }
      }
      return flat;
    }

    function buildWeeks(meetings) {
      const dates = uniqueSorted(meetings.map(m => m.date));
      const byWeek = {};
      for (const d of dates) {
        const dt = new Date(d + "T00:00:00");
        const monday = new Date(dt);
        const day = (dt.getDay() + 6) % 7;
        monday.setDate(dt.getDate() - day);
        const monStr = monday.toISOString().slice(0, 10);
        if (!byWeek[monStr]) byWeek[monStr] = [];
        byWeek[monStr].push(d);
      }
      return Object.keys(byWeek).sort().map(mon => ({
        key: mon,
        start: mon,
        end: byWeek[mon].sort().at(-1)
      }));
    }

    function buildGrid(config, columns, weekStart, tabMode) {
      const meetings = filterMeetingsByTab(state.allMeetings || [], tabMode).filter(m => {
        const dt = new Date(m.date + "T00:00:00");
        const monday = new Date(dt);
        const day = (dt.getDay() + 6) % 7;
        monday.setDate(dt.getDate() - day);
        return monday.toISOString().slice(0, 10) === weekStart;
      });

      const allowedDays = config.term?.days || ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
      const slotStarts = ((config.term?.time_slots && config.term.time_slots.length)
        ? config.term.time_slots
        : DEFAULT_TIME_SLOTS
      ).map(t => String(t).slice(0, 5));
      const slots = slotStarts.map(s => ({ start: s, end: add90m(s), label: `${s}-${add90m(s)}` }));
      const map = new Map();
      const backToBackSources = new Set();
      const backToBackTargets = new Set();

      for (const m of meetings) {
        const d = dayKey(m.date);
        const slot = String(m.start).slice(0, 5);
        for (const g of m.groups) {
          const k = `${d}|${slot}|${g}`;
          const current = map.get(k) || [];
          current.push(m);
          map.set(k, current);
        }
      }

      const slotIndexByStart = {};
      slots.forEach((s, i) => { slotIndexByStart[s.start] = i; });
      const byDayCourse = new Map();
      for (const m of meetings) {
        const key = `${m.date}|${m.course}`;
        const arr = byDayCourse.get(key) || [];
        arr.push(m);
        byDayCourse.set(key, arr);
      }
      for (const arr of byDayCourse.values()) {
        const lecs = arr.filter(m => String(m.tag).toLowerCase() === "lec");
        const tuts = arr.filter(m => String(m.tag).toLowerCase() === "tut");
        for (const lec of lecs) {
          const lecIdx = slotIndexByStart[String(lec.start).slice(0, 5)];
          if (!Number.isFinite(lecIdx)) continue;
          for (const tut of tuts) {
            const tutIdx = slotIndexByStart[String(tut.start).slice(0, 5)];
            if (!Number.isFinite(tutIdx) || tutIdx !== lecIdx + 1) continue;
            const lecGroups = new Set(lec.groups || []);
            const shareAudience = (tut.groups || []).some(g => lecGroups.has(g));
            if (!shareAudience) continue;
            backToBackSources.add(lec.instance_id);
            backToBackTargets.add(tut.instance_id);
          }
        }
      }

      return { allowedDays, slots, map, weekMeetings: meetings, backToBackSources, backToBackTargets, tabMode };
    }

    function columnsForTab(tabMode) {
      const baseColumns = state.columns || [];
      if (!baseColumns.length) return [];
      if (tabMode !== "core" && tabMode !== "english") return baseColumns;
      const tabMeetings = filterMeetingsByTab(state.allMeetings || [], tabMode);
      const usedGroups = new Set();
      for (const m of tabMeetings) {
        for (const g of (m.groups || [])) usedGroups.add(g);
      }
      if (tabMode === "english") {
        const normalizeEnglishTrackLabel = (trackName, groupId) => {
          const t = String(trackName || "").trim().toLowerCase();
          const gid = String(groupId || "").trim().toLowerCase();
          if (t.startsWith("awa") || gid.startsWith("eng-awa")) return "AWA";
          if (t.startsWith("eap") || gid.startsWith("eng-eap")) return "EAP";
          if (t === "fl" || t.startsWith("fl ") || gid.startsWith("eng-fl")) return "FL";
          return "FL";
        };
        const byId = {};
        for (const col of baseColumns) byId[col.groupId] = col;
        const englishPrograms = state.config?.programs?.english || [];
        const ordered = [];
        const seen = new Set();
        for (const program of englishPrograms) {
          for (const track of (program?.tracks || [])) {
            const trackLabel = normalizeEnglishTrackLabel(track?.name, "");
            for (const gid of (track?.groups || [])) {
              if (!usedGroups.has(gid) || seen.has(gid)) continue;
              const base = byId[gid];
              const baseGroupLabel = base?.groupLabel || gid;
              ordered.push({
                yearLabel: trackLabel,
                groupId: gid,
                groupLabel: baseGroupLabel
              });
              seen.add(gid);
            }
          }
        }
        for (const gid of Array.from(usedGroups).sort()) {
          if (seen.has(gid)) continue;
          const base = byId[gid];
          const trackLabel = normalizeEnglishTrackLabel("", gid);
          ordered.push({
            yearLabel: trackLabel,
            groupId: gid,
            groupLabel: base?.groupLabel || gid
          });
        }
        return ordered;
      }
      return baseColumns.filter((c) => usedGroups.has(c.groupId));
    }

    function renderCoreTable() {
      tableEl.innerHTML = "";
      if (!state.config || !state.output || !state.columns.length || !state.grid) return;

      const visibleColumns = columnsForTab(state.activeTab);
      if (!visibleColumns.length) return;

      const columnsByYear = {};
      for (const col of visibleColumns) {
        if (!columnsByYear[col.yearLabel]) columnsByYear[col.yearLabel] = [];
        columnsByYear[col.yearLabel].push(col);
      }

      const tr1 = document.createElement("tr");
      const leftHead = document.createElement("th");
      leftHead.className = "left-head";
      leftHead.rowSpan = 2;
      leftHead.textContent = "Day / Time";
      tr1.appendChild(leftHead);

      for (const yearLabel of Object.keys(columnsByYear)) {
        const th = document.createElement("th");
        th.className = "year-head";
        th.colSpan = columnsByYear[yearLabel].length;
        th.textContent = yearLabel;
        th.title = "Click to inspect this program";
        if (state.selection?.type === "program" && state.selection.value === yearLabel) {
          th.classList.add("selected");
        }
        th.addEventListener("click", () => {
          state.selection = { type: "program", value: yearLabel };
          buildDetailRows();
          renderActiveTab();
        });
        tr1.appendChild(th);
      }
      tableEl.appendChild(tr1);

      const tr2 = document.createElement("tr");
      for (const yearLabel of Object.keys(columnsByYear)) {
        for (const col of columnsByYear[yearLabel]) {
          const th = document.createElement("th");
          th.className = "group-head core-subhead";
          th.textContent = col.groupLabel;
          if (state.selection?.type === "group" && state.selection.value === col.groupId) {
            th.classList.add("selected");
          } else if (state.selection?.type === "program" && state.selection.value === col.yearLabel) {
            th.classList.add("selected");
          }
          th.addEventListener("click", () => {
            state.selection = { type: "group", value: col.groupId };
            buildDetailRows();
            renderActiveTab();
          });
          tr2.appendChild(th);
        }
      }
      tableEl.appendChild(tr2);

      for (const day of state.grid.allowedDays) {
        const dr = document.createElement("tr");
        dr.className = "day-row";
        const td = document.createElement("td");
        td.colSpan = visibleColumns.length + 1;
        const dayLabel = document.createElement("span");
        dayLabel.className = "day-label";
        dayLabel.textContent = day;
        td.appendChild(dayLabel);
        dr.appendChild(td);
        tableEl.appendChild(dr);

        for (const slot of state.grid.slots) {
          const tr = document.createElement("tr");
          tr.className = "slot-row";
          const slotTd = document.createElement("td");
          slotTd.className = "slot-cell";
          slotTd.textContent = slot.label;

          const cellCache = visibleColumns.map((col) => {
            const key = `${day}|${slot.start}|${col.groupId}`;
            const meetings = state.grid.map.get(key) || [];
            const mergedRows = mergedMeetingsForCell(meetings);
            return {
              groupId: col.groupId,
              mergedRows,
              sign: cellSignature(mergedRows)
            };
          });
          const yearHasMeetings = {};
          for (const yearLabel of Object.keys(columnsByYear)) {
            const yearColumns = columnsByYear[yearLabel] || [];
            yearHasMeetings[yearLabel] = yearColumns.some((col) => {
              const key = `${day}|${slot.start}|${col.groupId}`;
              return (state.grid.map.get(key) || []).length > 0;
            });
          }
          const rowHasMeetings = Object.values(yearHasMeetings).some(Boolean);
          if (!rowHasMeetings) {
            slotTd.classList.add("no-events-row");
          }
          tr.appendChild(slotTd);

          for (let i = 0; i < visibleColumns.length; ) {
            const current = cellCache[i];
            let span = 1;
            if (current.sign) {
              while (i + span < cellCache.length && cellCache[i + span].sign === current.sign) {
                span += 1;
              }
            }
            const td = document.createElement("td");
            td.classList.add("link-cell");
            const isProgramEmptyAtSlot = !yearHasMeetings[visibleColumns[i].yearLabel];
            if (isProgramEmptyAtSlot) {
              td.classList.add("no-events-program-slot");
            }
            if (span > 1) td.colSpan = span;

            if (!current.mergedRows.length) {
              const e = document.createElement("div");
              e.className = "empty";
              e.addEventListener("click", () => {
                state.selection = null;
                buildDetailRows();
                renderActiveTab();
              });
              td.appendChild(e);
            } else {
              const hasSource = current.mergedRows.some(r => state.grid?.backToBackSources?.has(r.sample.instance_id));
              const hasTarget = current.mergedRows.some(r => state.grid?.backToBackTargets?.has(r.sample.instance_id));
              if (hasSource || hasTarget) {
                const directionClass = hasSource && hasTarget ? "both" : (hasSource ? "down" : "up");
                const markers = Math.max(1, span);
                const sampleColor = colorBySubject(current.mergedRows[0]?.sample?.course || "").border;
                for (let mk = 0; mk < markers; mk++) {
                  const connector = document.createElement("div");
                  connector.className = `cell-connector ${directionClass}`;
                  connector.style.setProperty("--connector-color", sampleColor);
                  connector.style.left = `${((mk + 0.5) / markers) * 100}%`;
                  td.appendChild(connector);
                }
              }
              for (const row of current.mergedRows) {
                const m = row.sample;
                const count = row.count;
                const el = document.createElement("div");
                el.className = "meeting";
                const colors = colorBySubject(m.course);
                el.style.setProperty("--meeting-bg", colors.bg);
                el.style.setProperty("--meeting-border", colors.border);
                const sign = signatureMeeting(m);
                if (state.selection?.type === "meeting") {
                  const selectedCourse = state.selection.course || "";
                  if (m.course === selectedCourse) {
                    el.classList.add("related");
                  }
                  if (state.selection.value === meetingSelectionKey(m)) {
                    el.classList.add("selected");
                  }
                }
                const subject = document.createElement("div");
                subject.className = "subject";
                subject.textContent = `${m.course} (${m.tag})${count > 1 ? ` x${count}` : ""}`;
                const inst = document.createElement("div");
                inst.className = "line";
                if (m.instructors && m.instructors.length) {
                  m.instructors.forEach((name, idx) => {
                    const s = document.createElement("span");
                    s.className = "clickable";
                    s.textContent = name;
                    s.title = "Click to inspect instructor";
                    s.addEventListener("click", (ev) => {
                      ev.stopPropagation();
                      state.selection = { type: "instructor", value: name };
                      buildDetailRows();
                      renderActiveTab();
                    });
                    inst.appendChild(s);
                    if (idx < m.instructors.length - 1) {
                      inst.appendChild(document.createTextNode(" / "));
                    }
                  });
                } else {
                  inst.textContent = "-";
                }
                const room = document.createElement("div");
                room.className = "line";
                const studentsCount = meetingStudentCount(m);
                const capacity = state.roomCapacityById?.[m.room];
                const roomLabel = m.room || "-";
                const loadLabel = `${studentsCount} / ${capacity ?? "-"}`;
                if (m.room) {
                  const rs = document.createElement("span");
                  rs.className = "clickable";
                  rs.textContent = `${roomLabel} (${loadLabel})`;
                  rs.title = "Click to inspect room";
                  rs.addEventListener("click", (ev) => {
                    ev.stopPropagation();
                    state.selection = { type: "room", value: m.room };
                    buildDetailRows();
                    renderActiveTab();
                  });
                  room.appendChild(rs);
                } else {
                  room.textContent = `${roomLabel} (${loadLabel})`;
                }
                if (Number.isFinite(capacity) && studentsCount > capacity) {
                  room.classList.add("over-capacity");
                }
                el.appendChild(subject);
                if (state.grid?.backToBackSources?.has(m.instance_id)) el.classList.add("b2b-source");
                if (state.grid?.backToBackTargets?.has(m.instance_id)) el.classList.add("b2b-target");
                el.appendChild(inst);
                el.appendChild(room);
                el.addEventListener("click", () => {
                  state.selection = { type: "meeting", value: meetingSelectionKey(m), course: m.course };
                  buildDetailRows();
                  renderActiveTab();
                });
                td.appendChild(el);
              }
            }
            tr.appendChild(td);
            i += span;
          }
          tableEl.appendChild(tr);
        }
      }
    }

    function renderUtilizationTable(mode) {
      tableEl.innerHTML = "";
      if (!state.grid) return;
      const weekMeetings = state.grid.weekMeetings || [];
      let resourceCols = [];
      let headerTitle = "";
      if (mode === "instructor") {
        resourceCols = Array.from(new Set(weekMeetings.flatMap(m => m.instructors || []))).sort();
        headerTitle = "Instructor";
      } else {
        resourceCols = Array.from(new Set(weekMeetings.map(m => m.room).filter(Boolean))).sort();
        headerTitle = "Room";
      }

      const tr1 = document.createElement("tr");
      const leftHead = document.createElement("th");
      leftHead.className = "left-head";
      leftHead.rowSpan = 2;
      leftHead.textContent = "Day / Time";
      tr1.appendChild(leftHead);
      const titleHead = document.createElement("th");
      titleHead.className = "year-head";
      titleHead.colSpan = Math.max(1, resourceCols.length);
      titleHead.textContent = `${headerTitle} Utilization`;
      tr1.appendChild(titleHead);
      tableEl.appendChild(tr1);

      const tr2 = document.createElement("tr");
      for (const col of resourceCols) {
        const th = document.createElement("th");
        th.className = "group-head core-subhead";
        const cap = state.roomCapacityById?.[col];
        th.textContent = mode === "room" ? `${col} (cap ${cap ?? "-"})` : col;
        th.title = `Click to inspect ${headerTitle.toLowerCase()}`;
        const selType = mode === "instructor" ? "instructor" : "room";
        if (state.selection?.type === selType && state.selection.value === col) {
          th.classList.add("selected");
        }
        th.addEventListener("click", () => {
          state.selection = { type: selType, value: col };
          buildDetailRows();
          renderActiveTab();
        });
        tr2.appendChild(th);
      }
      tableEl.appendChild(tr2);

      for (const day of state.grid.allowedDays) {
        const dr = document.createElement("tr");
        dr.className = "day-row";
        const td = document.createElement("td");
        td.colSpan = resourceCols.length + 1;
        const dayLabel = document.createElement("span");
        dayLabel.className = "day-label";
        dayLabel.textContent = day;
        td.appendChild(dayLabel);
        dr.appendChild(td);
        tableEl.appendChild(dr);

        for (const slot of state.grid.slots) {
          const tr = document.createElement("tr");
          tr.className = "slot-row";
          const slotTd = document.createElement("td");
          slotTd.className = "slot-cell";
          slotTd.textContent = slot.label;
          tr.appendChild(slotTd);

          for (const resource of resourceCols) {
            const td = document.createElement("td");
            td.classList.add("link-cell");
            const matches = weekMeetings.filter((m) => {
              if (dayKey(m.date) !== day) return false;
              if (String(m.start).slice(0, 5) !== slot.start) return false;
              if (mode === "instructor") return (m.instructors || []).includes(resource);
              return (m.room || "") === resource;
            });
            if (!matches.length) {
              const e = document.createElement("div");
              e.className = "empty";
              td.appendChild(e);
            } else {
              const merged = mergedMeetingsForCell(matches);
              const hasSource = merged.some(r => state.grid?.backToBackSources?.has(r.sample.instance_id));
              const hasTarget = merged.some(r => state.grid?.backToBackTargets?.has(r.sample.instance_id));
              if (hasSource || hasTarget) {
                const connector = document.createElement("div");
                connector.className = `cell-connector ${hasSource && hasTarget ? "both" : (hasSource ? "down" : "up")}`;
                const sampleColor = colorBySubject(merged[0]?.sample?.course || "").border;
                connector.style.setProperty("--connector-color", sampleColor);
                td.appendChild(connector);
              }
              for (const row of merged) {
                const m = row.sample;
                const el = document.createElement("div");
                el.className = "meeting";
                const colors = colorBySubject(m.course);
                el.style.setProperty("--meeting-bg", colors.bg);
                el.style.setProperty("--meeting-border", colors.border);
                const sign = signatureMeeting(m);
                if (state.selection?.type === "meeting") {
                  const selectedCourse = state.selection.course || "";
                  if (m.course === selectedCourse) el.classList.add("related");
                  if (state.selection.value === meetingSelectionKey(m)) el.classList.add("selected");
                }
                const subject = document.createElement("div");
                subject.className = "subject";
                subject.textContent = `${m.course} (${m.tag})${row.count > 1 ? ` x${row.count}` : ""}`;
                const detail = document.createElement("div");
                detail.className = "line";
                const studentsCount = meetingStudentCount(m);
                const capacity = state.roomCapacityById?.[m.room];
                const roomLoad = `${m.room || "-"} (${studentsCount} / ${capacity ?? "-"})`;
                if (mode === "instructor") {
                  detail.textContent = `${m.groups.join(", ")} | ${roomLoad}`;
                } else {
                  detail.textContent = `${m.groups.join(", ")} | ${roomLoad} | fill ${roomFillPercent(m)} | ${(m.instructors || []).join(" / ") || "-"}`;
                }
                if (Number.isFinite(capacity) && studentsCount > capacity) {
                  detail.classList.add("over-capacity");
                }
                el.appendChild(subject);
                if (state.grid?.backToBackSources?.has(m.instance_id)) el.classList.add("b2b-source");
                if (state.grid?.backToBackTargets?.has(m.instance_id)) el.classList.add("b2b-target");
                el.appendChild(detail);
                el.addEventListener("click", () => {
                  state.selection = { type: "meeting", value: meetingSelectionKey(m), course: m.course };
                  buildDetailRows();
                  renderActiveTab();
                });
                td.appendChild(el);
              }
            }
            tr.appendChild(td);
          }
          tableEl.appendChild(tr);
        }
      }
    }

    function renderActiveTab() {
      const tabButtons = Array.from(document.querySelectorAll(".tab-btn"));
      for (const btn of tabButtons) {
        btn.classList.toggle("active", btn.getAttribute("data-tab") === state.activeTab);
      }
      const wk = state.weeks[state.weekIndex];
      if (wk) {
        const gridTabMode = state.activeTab === "core" || state.activeTab === "english" ? state.activeTab : "all";
        if (!state.grid || state.grid.tabMode !== gridTabMode) {
          state.grid = buildGrid(state.config, state.columns, wk.start, gridTabMode);
        }
      }
      if (state.activeTab === "instructor") {
        renderUtilizationTable("instructor");
      } else if (state.activeTab === "room") {
        renderUtilizationTable("room");
      } else {
        renderCoreTable();
      }
      requestAnimationFrame(syncTopScrollbarWidth);
    }

    function syncTopScrollbarWidth() {
      const width = Math.max(tableEl.scrollWidth, gridWrapEl.clientWidth);
      topScrollInnerEl.style.width = `${width}px`;
    }

    function renderWeek() {
      if (!state.weeks.length) {
        weekLabelEl.textContent = "Week -";
        document.getElementById("prevWeek").disabled = true;
        document.getElementById("nextWeek").disabled = true;
        return;
      }
      const wk = state.weeks[state.weekIndex];
      weekLabelEl.textContent = `Week ${state.weekIndex + 1}/${state.weeks.length}: ${wk.start} .. ${wk.end}`;
      document.getElementById("prevWeek").disabled = state.weekIndex <= 0;
      document.getElementById("nextWeek").disabled = state.weekIndex >= state.weeks.length - 1;
      const gridTabMode = state.activeTab === "core" || state.activeTab === "english" ? state.activeTab : "all";
      state.grid = buildGrid(state.config, state.columns, wk.start, gridTabMode);
      renderActiveTab();
      updateStats();
      if (state.selection) buildDetailRows();
    }

    async function doRender() {
      setMsg("");
      try {
        const configFile = document.getElementById("configFile").files[0];
        const outputFile = document.getElementById("outputFile").files[0];
        if (!configFile || !outputFile) {
          throw new Error("Please choose both config.yaml and output.yaml.");
        }

        const [config, output] = await Promise.all([
          parseYamlFile(configFile),
          parseYamlFile(outputFile)
        ]);

        if (!output || !output.schedule || !Array.isArray(output.schedule.courses)) {
          throw new Error("output.yaml does not look like solver output from main.py.");
        }
        if (!config || !config.term) {
          throw new Error("config.yaml does not look like schedule config.");
        }

        state.courseTabByName = buildCourseTabMap(config);
        const meetings = buildMeetings(output, state.courseTabByName);
        if (!meetings.length) {
          throw new Error("No meetings found in output.yaml.");
        }

        state.config = config;
        state.output = output;
        state.allMeetings = meetings;
        state.roomCapacityById = buildRoomCapacityMap(config);
        state.groupSizeById = buildGroupSizeMap(config);
        state.courseColors = buildCourseColors(meetings);
        state.selection = null;
        state.columns = buildColumns(config, output);
        if (!state.columns.length) {
          throw new Error("Could not build group columns from config/output.");
        }
        state.weeks = buildWeeks(meetings);
        state.weekIndex = 0;

        metaEl.textContent = `Status: ${output.status || "unknown"} | Term: ${config.term?.name || "-"} | Columns: ${state.columns.length}`;
        buildDetailRows();
        renderWeek();
      } catch (err) {
        setMsg(String(err?.message || err));
      }
    }

    document.getElementById("renderBtn").addEventListener("click", doRender);
    document.getElementById("prevWeek").addEventListener("click", () => {
      if (state.weekIndex > 0) {
        state.weekIndex -= 1;
        renderWeek();
      }
    });
    document.getElementById("nextWeek").addEventListener("click", () => {
      if (state.weekIndex < state.weeks.length - 1) {
        state.weekIndex += 1;
        renderWeek();
      }
    });
    topScrollEl.addEventListener(
      "scroll",
      () => {
        if (hScrollFromGrid) return;
        hScrollFromTopBar = true;
        gridWrapEl.scrollLeft = topScrollEl.scrollLeft;
        hScrollFromTopBar = false;
      },
      { passive: true }
    );
    gridWrapEl.addEventListener(
      "scroll",
      () => {
        if (hScrollFromTopBar) return;
        hScrollFromGrid = true;
        topScrollEl.scrollLeft = gridWrapEl.scrollLeft;
        hScrollFromGrid = false;
      },
      { passive: true }
    );
    window.addEventListener("resize", syncTopScrollbarWidth);
    document.getElementById("hideConfigBtn").addEventListener("click", () => {
      document.body.classList.add("config-hidden");
      requestAnimationFrame(syncTopScrollbarWidth);
    });
    document.getElementById("showConfigBtn").addEventListener("click", () => {
      document.body.classList.remove("config-hidden");
      requestAnimationFrame(syncTopScrollbarWidth);
    });
    document.querySelectorAll(".tab-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        state.activeTab = btn.getAttribute("data-tab") || "core";
        renderActiveTab();
      });
    });
    detailListEl.addEventListener("click", (ev) => {
      const t = ev.target;
      if (!(t instanceof Element)) return;
      const instEl = t.closest(".instructor-link");
      const roomEl = t.closest(".room-link");
      const groupEl = t.closest(".group-link");
      if (groupEl) {
        ev.stopPropagation();
        const encoded = groupEl.getAttribute("data-group") || "";
        const groupId = decodeURIComponent(encoded);
        if (!groupId) return;
        state.selection = { type: "group", value: groupId };
        buildDetailRows();
        renderActiveTab();
        return;
      }
      if (instEl) {
        ev.stopPropagation();
        const encoded = instEl.getAttribute("data-inst") || "";
        const instName = decodeURIComponent(encoded);
        if (!instName) return;
        state.selection = { type: "instructor", value: instName };
        buildDetailRows();
        renderActiveTab();
        return;
      }
      if (roomEl) {
        ev.stopPropagation();
        const encoded = roomEl.getAttribute("data-room") || "";
        const roomName = decodeURIComponent(encoded);
        if (!roomName) return;
        state.selection = { type: "room", value: roomName };
        buildDetailRows();
        renderActiveTab();
      }
    });
    document.getElementById("clearSelectionBtn").addEventListener("click", () => {
      state.selection = null;
      buildDetailRows();
      renderActiveTab();
    });
    document.addEventListener("click", (ev) => {
      const t = ev.target;
      if (!(t instanceof Element)) return;
      if (t.closest(".meeting") || t.closest(".year-head") || t.closest(".group-head") || t.closest(".clickable") || t.closest(".detail") || t.closest("button") || t.closest("input")) {
        return;
      }
      if (state.selection) {
        state.selection = null;
        buildDetailRows();
        renderActiveTab();
      }
    });
  </script>
</body>
</html>
